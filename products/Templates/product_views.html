{% extends 'main/base.html' %}
{% load static %}
{% block content %}
<br />
<br />

<div id="msg-alert">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
      {% endfor %}
    {% endif %}
</div>

<a href = "{% url 'create_product' user_id %}" class="btn btn-primary" style="position: absolute; right: 100px;">
    Create Product
</a>


{% endblock %}
