{% extends 'main/base.html' %}
{% load static %}

{% block content %}

<div class="parent">
  <form class="login-card" action="{% url 'create_product' user_id %}" method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="container">
      <p class="noto-sans-arabic-product font-sub-title">اسم المنتج </p>
      <input class="custom-input" type="text" name="product_name">
      <br />
      <p class="noto-sans-arabic-product font-sub-title">
        رابط الموقع
      </p>
      <input class="custom-input" type="url" name="product_link">
      <br />
      <p class="noto-sans-arabic-product font-sub-title">
        إرفاق الشعار
      </p>
      <input type="file" class="custom-upload-btn" name="product_logo" width="48" height="48">

      <br />

      <p class="noto-sans-arabic-product font-sub-title">
        التاريخ </p>
      <input type="date" name="product_date" class="date-card" value="2026-01-01" min="1990-01-01" max="2026-12-01">
      <br />
      <p class="noto-sans-arabic-product font-sub-title">
        الوصف </p>
      <textarea class="custom-input" name="description" class="form-control" rows="2" cols="50"></textarea>
      <br />
      <br />
      <button class="button-25 button-center" type="submit" name="Save">إنشاء</button>
    </div>
  </form>
</div>
{% endblock %}
