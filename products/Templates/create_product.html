{% extends 'main/base.html' %}
{% load static %}

{% block content %}
<br />
<br />

<form action="{% url 'create_product' user_id %}" method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <div class="container">
    Product Name:
    <br />
    <input type="text" name="product_name">
    <br />
    <br />
    Enter the Product link:
    <br />
    <input type="url" name="product_link">
    <br />
    <br />
    Upload the logo:
    <br />
    <input type="file"  name="product_logo" width="48" height="48">

    <br/>
    <br/>
    Enetr Start date:
    <br/>
    <input type="date" name="product_date" value="2026-01-01" min="1990-01-01" max="2026-12-01">
    <br/>

    <br />
    The description:
    <br />
    <textarea name="description" class="form-control" rows="3" cols="50"></textarea>

    <br/>   
    <div class="container">
          
          <button class="btn btn-primary" type="submit" name="Save" style="position: absolute; right: 180px;">Save</button>
    </div>
  </div>
</form>




{% endblock %}
